desc = "This spell evokes 8 different rays. Each ray is a different color and has a different power and purpose. Each creature in a 12 m cone must make a Dexterity saving throw. For each target, roll a d8 to determine which color ray affects it. 1. Red: The target takes 10d6 fire damage on a failed save, or half as much damage on a successful one. 3. Yellow: The target takes 10d6 lightning damage on a failed save, or half as much damage on a successful one. 4. Green: The target takes 10d6 poison damage on a failed save, or half as much damage on a successful one. 5. Blue: The target takes 10d6 cold damage on a failed save, or half as much damage on a successful one. 6. Indigo: On a failed save, the target is restrained. It must then make a Vitality saving throw at the end of each of its turns. If it successfully saves three times, the spell ends. If it fails its save three times, it permanently turns to stone and is subjected to the petrified condition. The successes and failures don't need to be consecutive; keep track of both until the target collects three of a kind. 7. Violet: On a failed save, the target is blinded. It must then make a Composure saving throw at the start of your next turn. A successful save ends the blindness. If it fails that save, the creature is transported to another Realm of the GM's choosing and is no longer blinded. (Typically, a creature that is in a Realm that isn't its home is banished home, while other creatures can be cast into the Ethereal Plane.) 8. Special: The target is struck by two rays. Roll twice more, rerolling any 8."

