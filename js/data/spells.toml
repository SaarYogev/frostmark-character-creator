desc = "You ask a powerful entity for aid. The being must be known to you: an Enneade, an ancient elemental, a demon lord, or some other being of cosmic power. That entity sends a celestial, an elemental, or a fiend loyal to it to aid you, making the creature appear in an unoccupied space within range. If you know a specific creature's name, you can speak that name when you cast this spell to request that creature, though you might get a different creature anyway (GM's choice). When the creature appears, it is under no compulsion to behave in any particular way. You can ask the creature to perform a service in exchange for payment, but it isn't obliged to do so. The requested task could range from simple (fly us across the chasm, or help us fight a battle) to complex (spy on our enemies, or protect us during our foray into the dungeon). You must be able to communicate with the creature to bargain for its services. However, creatures rarely accept tasks that seem suicidal. After the creature completes the task, or when the duration of service expires, the creature returns to its home Realm after reporting back to you, if appropriate to the task and if possible. If you are unable to agree on a task, the creature immediately returns to its home Realm."

