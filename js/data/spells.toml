concentration = true
desc = "You conjure up a sphere of water with a 1 m radius at a point you can see within range. The sphere can hover but no more than 2 m off the ground. The sphere remains for the spell’s duration. Any creature in the sphere’s space must make a Brawn saving throw. On a successful save, a creature is ejected from that space to the nearest unoccupied space of the creature’s choice outside the sphere. A Huge or larger creature succeeds on the saving throw automatically, and a Large or smaller creature can choose to fail it. On a failed save, a creature is restrained by the sphere and is engulfed by the water. At the end of each of its turns, a restrained target can repeat the saving throw, ending the effect on itself on a success. The sphere can restrain as many as four Medium or smaller creatures or one Large creature. If the sphere restrains a creature that causes it to exceed this capacity, a random creature that was already restrained by the sphere falls out of it and lands prone in a space within 1 m of it. As an action, you can move the sphere up to 6 m in a straight line. If it moves over a pit, a cliff, or another drop-off, it safely descends until it is hovering 2 m above the ground. Any creature restrained by the sphere moves with it. You can ram the sphere into creatures, forcing them to make the saving throw. When the spell ends, the sphere falls to the ground and extinguishes all normal flames within 6 m of it. Any creature restrained by the sphere is knocked prone in the space where it falls. The water then vanishes."

[Cloudkill]
