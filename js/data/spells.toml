rangeLabel = "18"
damageTypes = []
duration = "Up to 1 hour"
concentration = true
desc = "You summon a devil. You choose the devil’s type, which must be one of challenge rating 6 or lower, such as a barbed devil or a bearded devil. The devil appears in an unoccupied space that you can see within range. The devil disappears when it drops to 0 hit points or when the spell ends. The devil is unfriendly toward you and your companions. Roll initiative for the devil, which has its own turns. It is under the GM’s control and acts according to its nature on each of its turns, which might result in its attacking you if it thinks it can prevail or trying to tempt you to undertake an evil act in exchange for limited service. The Bestiary has the creature’s statistics. On each of your turns, you can try to issue a verbal command to the devil (no action required by you). It obeys the command if the likely outcome is following its desires. Otherwise, you must make a Deception (Pre/Man) or Persuasion (Pre/Man) check contested by its Empathy (Com) check. You make the check with advantage if you say the devil’s true name. If your check fails, the devil becomes immune to your verbal commands for the duration of the spell, though it can still carry out your commands if it chooses. If your check succeeds, the devil carries out your command— such as “attack my enemies,” “explore the room ahead,\" or “bear this message to the queen\"—until it completes the activity, at which point it returns to you to report having done so. If your concentration ends before the spell reaches its full duration, the devil doesn‘t disappear if it has become immune to your verbal commands. Instead, it acts in whatever manner it chooses for 3d6 minutes, and then it disappears. If you possess an individual devil’s talisman, you can summon that devil if it is of the appropriate challenge rating plus 1, and it obeys all your commands, with no ability checks required. At higher levels: When you cast this spell using a spell slot of 6th level or higher, the challenge rating increases by 1 for each slot level above 5th."

