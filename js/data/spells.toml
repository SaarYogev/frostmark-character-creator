rangeLabel = "2"
damageTypes = []
duration = "Instant"
concentration = false
desc = "This spell creates up to two undead servants. Choose a pile of bones or a corpse of a Medium or Small humanoid within range. The target becomes a skeleton if you chose bones or a zombie if you chose a corpse (the Bestiary has the creature's game statistics). On each of your turns, you can use a bonus action to mentally command any creature you made with this spell if the creature is within 12 m of you (if you control multiple creatures, you can command any or all of them at the same time, issuing the same command to each one). You decide what action the creature will take and where it will move during its next turn, or you can issue a general command, such as to guard a particular chamber or corridor. If you issue no commands, the creature only defends itself against hostile creatures. Once given an order, the creature continues to follow it until its task is complete. The creature is under your control for 24 hours, after which it stops obeying any command you've given it. To maintain control of the creature for another 24 hours, you must cast this spell on the creature again before the current 24-hour period ends. This use of the spell reasserts your control over up to four creatures you have animated with this spell, rather than animating a new one. Whenever this spell is cast to reassert control over the undead rather than create new ones, the spell does not require Soul Consumption. At higher levels: When you cast this spell using a spell slot of 4th level or higher, you animate or reassert control over two additional undead creatures for each slot level above 3rd. Each of the creatures must come from a different corpse or pile of bones."

["Bestow Curse"]
school = "Vismancy"
level = 3
castingTime = "1 action"
range = 0
rangeLabel = "Touch"
damageTypes = [ "necrotic" ]
duration = "1 minute"
concentration = true
desc = "You touch a creature, and that creature must succeed on a Pre/Man saving throw or become cursed for the duration of the spell. When you cast this spell, choose the nature of the curse from the following options: Choose one ability score: While cursed, the target has disadvantage on ability checks and saving throws made with that ability score. While cursed, the target has disadvantage on attack rolls against you. While cursed, the target must make a Pre/Man saving throw at the start of each of its turns. If it fails, it wastes its action that turns doing nothing. While the target is cursed, your attacks and spells deal an extra 1d8 necrotic damage to the target. A spell that removes curses ends this effect. At the GM's option, you may choose an alternative curse effect, but it should be no more powerful than those described above. The GM has final say on such a curse's effect. At higher levels: If you cast this spell using a spell slot of 4th level or higher, the duration is concentration, up to 10 minutes. If you use a spell slot of 5th level or higher, the duration is 8 hours. If you use a spell slot of 7th level or higher, the duration is 24 hours. If you use a 9th level spell slot, the spell lasts until it is dispelled. Using a spell slot of 5th level or higher grants a duration that doesn't require concentration."

