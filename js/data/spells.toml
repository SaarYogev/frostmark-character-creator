range = 18
rangeLabel = "96"
damageTypes = [ "force" ]
duration = "10 minutes"
concentration = true
desc = "Until the spell ends, you control any freestanding water inside an area you choose that is a cube up to 30 meters on a side. You can choose from any of the following effects when you cast this spell. As an action on your turn, you can repeat the same effect or choose a different one. Flood: You cause the water level of all standing water in the area to rise by as much as 4 meters. If the area includes a shore, the flooding water spills over onto dry land. If you choose an area in a large body of water, you instead create a 4-meter tall wave that travels from one side of the area to the other and then crashes down. Any Huge or smaller vehicles in the wave's path are carried with it to the other side. Any Huge or smaller vehicles struck by the wave have a 25 percent chance of capsizing. The water level remains elevated until the spell ends or you choose a different effect. If this effect produces a wave, the wave repeats at the start of your next turn while the flood effect lasts. Part Water: You cause water in the area to move apart and create a trench. The trench extends across the spell's area, and the separated water forms a wall to either side. The trench remains until the spell ends or you choose a different effect. The water then slowly fills in the trench over the course of the next round until the normal water level is restored. Redirect Flow: You cause flowing water in the area to move in a direction you choose, even if the water has to flow over obstacles, up walls, or in other unlikely directions. The water in the area moves as you direct it, but once it moves beyond the spell's area, it resumes its flow based on the terrain conditions. The water continues to move in the direction you choose until the spell ends or you choose a different effect. Whirlpool: This effect requires a body of water at least 10 meters square and 5 meters deep. You cause a whirlpool to form in the center of the area. The whirlpool forms a vortex that is 1 meter wide at the base, up to 10 meters wide at the top, and 5 meters tall. Any creature or object in the water and within 5 meters of the vortex is pulled 2 meters toward it. A creature can swim away from the vortex by making an Athletics (Br) check against your spell save DC. When a creature enters the vortex for the first time on a turn or starts its turn there, it must make a Brawn saving throw. On a failed save, the creature takes 2d8 force damage and is caught in the vortex until the spell ends. On a successful save, the creature takes half damage, and isn't caught in the vortex. A creature caught in the vortex can use its action to try to swim away from the vortex as described above but has disadvantage on the Athletics (Br) check to do so. The first time each turn that an object enters the vortex, the object takes 2d8 force damage; this damage occurs each round it remains in the vortex."

["Elemental Bane"]
school = "Transmutation"
level = 4
castingTime = "1 action"
range = 18
rangeLabel = "18"
damageTypes = [ "acid", "cold", "fire", "lightning", "thunder" ]
duration = "Up to 1 min"
concentration = true
desc = "Choose one creature you can see within range, and choose one of the following damage types: acid, cold, fire, lightning, or thunder. The target must succeed on a Vitality saving throw or be affected by the spell for its duration. The first time each turn the affected target takes damage of the chosen type, the target takes an extra 2d6 damage of that type. Moreover, the target loses any resistance to that damage type until the spell ends. At higher levels: When you cast this spell using a spell slot of 5th level or higher, you can target one additional creature for each slot level above 4th. The creatures must be within 6 m of each other when you target them."

[Fabricate]
school = "Transmutation"
level = 4
castingTime = "10 minutes"
range = 18
rangeLabel = "36"
damageTypes = []
duration = "Instant"
concentration = false
desc = "You convert raw materials into products of the same material. For example, you can fabricate a wooden bridge from a clump of trees, a rope from a patch of hemp, and clothes from flax or wool. Choose raw materials that you can see within range. You can fabricate a Large or smaller object (contained within a 2-meter cube, or eight connected 1-meter cubes), given a sufficient quantity of raw material. If you are working with metal, stone, or another mineral substance, however, the fabricated object can be no larger than Medium (contained within a single 1-meter cube). The quality of objects made by the spell is commensurate with the quality of the raw materials. Creatures or magic items can't be created or transmuted by this spell. You also can't use it to create items that ordinarily require a high degree of craftsmanship, such as jewelry, weapons, glass, or armor, unless you have proficiency with the type of Artisan's Tools used to craft such objects."

["Giant Insect"]
school = "Transmutation"
level = 4
castingTime = "1 action"
range = 18
rangeLabel = "6"
damageTypes = []
duration = "10 minutes"
concentration = true
desc = "You transform up to ten centipedes, three spiders, five wasps, or one scorpion within range into giant versions of their natural forms for the duration. A centipede becomes a giant centipede, a spider becomes a giant spider, a wasp becomes a giant wasp, and a scorpion becomes a giant scorpion. Each creature obeys your verbal commands, and in combat, they act on your turn each round. The GM has the statistics for these creatures and resolves their actions and movement. A creature remains in its giant size for the duration, until it drops to 0 hit points, or until you use an action to dismiss the effect on it. The GM might allow you to choose different targets. For example, if you transform a bee, its giant version might have the same statistics as a giant wasp."

[Polymorph]
