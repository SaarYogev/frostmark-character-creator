desc = "You and up to eight willing creatures who link hands are transported to a different Realm. You can specify a target destination in general terms, such as The Eye in the Realm of Eternal Suns or the palace of Lapuana far below the surface of Atlas, and you appear in or near that destination. If you are trying to reach The Eye, for example, you might arrive in its Garden District, before the gates of the Law District, or looking at the city from across the desert sands, at the GM's discretion. Alternatively, if you know the sigil sequence of a Teleportation Circle within another Realm, this spell can take you to that circle. If the Teleportation Circle is too small to hold all the creatures you transported, they appear in the closest unoccupied spaces next to the circle. You can use this spell to banish an unwilling creature to another Realm. Choose a creature within your reach and make a melee spell attack against it. On a hit, the creature must make a Pre/Man saving throw. If the creature fails this save, it is transported to a random location within a Realm you specify. A creature so transported must find its own way back to your current Realm."

[Teleport]
school = "Conjuration"
level = 7
castingTime = "1 action"
range = 18
rangeLabel = "2"
damageTypes = [ "force" ]
duration = "Instant"
concentration = false
desc = "This spell instantly transports you and up to eight willing creatures of your choice that you can see within range, or a single object that you can see within range, to a destination you select. If you target an object, it must be able to fit entirely inside a 4 m cube, and it can't be held or carried by an unwilling creature. The destination you choose must be known to you, and it must be within the same Realm as you. Your familiarity with the destination determines whether you arrive there successfully. The GM rolls d100 and consults the table. Permanent circle: Means a permanent Teleportation Circle whose sigil sequence you know. Associated object: Means that you possess an object taken from the desired destination within the last six months, such as bed linen from a royal suite. Very familiar: Is a place you have been very often, a place you have carefully studied, or a place you can see when you cast the spell. Seen casually: Is someplace you have seen more than once but with which you aren't very familiar. Viewed once: Is a place you have seen once, possibly using magic. Description: Is a place whose location and appearance you know through someone else's description, perhaps from a map. False destination: Is a place that doesn't exist. Perhaps you tried to scry an enemy's sanctum but instead viewed an illusion, or you are attempting to teleport to a familiar location that no longer exists. On Target: You and your group (or the target object) appear where you want to. Off Target: You and your group (or the target object) appear a random distance away from the destination in a random direction. Distance off target is 1d10 × 1d10 percent of the distance that was to be traveled. For example, if you tried to travel 200 km, landed off target, and rolled a 5 and 3 on the two d10s, then you would be off target by 15 percent or 30 km. The GM determines the direction off target randomly by rolling a d8 and designating 1 as north, 2 as northeast, 3 as east, and so on around the points of the compass. If you were teleporting to a coastal city and wound up 30 km out at sea, you could be in trouble. Similar Area: You and your group (or the target object) wind up in a different area that's visually or thematically similar to the target area. If you are heading for your home laboratory, for example, you might wind up in another's laboratory or in an alchemical supply shop that has many of the same tools and implements as your laboratory. Generally, you appear in the closest similar place, but since the spell has no range limit, you could conceivably wind up anywhere on the Realm. Mishap: The spell's unpredictable magic results in a difficult journey. Each teleporting creature (or the target object) takes 3d10 force damage, and the GM rerolls on the table to see where you wind up (multiple mishaps can occur, dealing damage each time)."

