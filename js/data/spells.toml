concentration = false
desc = "For the duration, you shield a creature or an object you touch from divination spells. The target can be a willing creature or an object no more than 4 cubic meters and that isn't being carried or worn by another creature. When you cast the spell, choose one effect. The effect lasts for the duration. If you cast this spell on the same creature or object every day for 30 days, placing the same effect on it each time, the illusion lasts until it is dispelled. False Aura: You change the way the target appears to spells and magical effects, such as Detect Magic, that detect magical auras. You can make a nonmagical object appear magical, a magical object appears nonmagical, or change the object's magical aura so that it appears to belong to a specific school of magic that you choose. When you use this effect on an object, you can make the false magic apparent to any creature that handles the item. Mask: You change the way the target appears to spells and magical effects that detect creature types, such as Divine Sense or the trigger of a Symbol spell. You choose a creature type and other spells and magical effects treat the target as if it were a creature of that type or of that alignment. Veil: The target can't be targeted by any divination magic or perceived through magical scrying sensors."

["Mirror Image"]
school = "Illusion"
level = 2
castingTime = "1 action"
range = 0
rangeLabel = "Self"
damageTypes = []
duration = "1 minute"
concentration = false
desc = "Three illusory duplicates of yourself appear in your space. Until the spell ends, the duplicates move with you and mimic your actions, shifting position so it's impossible to track which image is real. You can use your action to dismiss the illusory duplicates. Each time a creature targets you with an attack during the spell's duration, roll a d20 to determine whether the attack instead targets one of your duplicates. If you have three duplicates, you must roll a 6 or higher to change the attack's target to a duplicate. With two duplicates, you must roll an 8 or higher. With one duplicate, you must roll an 11 or higher. A duplicate's AC equals 10 + your Dexterity modifier. If an attack hits a duplicate, the duplicate is destroyed. A duplicate can be destroyed only by an attack that hits it. It ignores all other damage and effects. The spell ends when all three duplicates are destroyed. A creature is unaffected by this spell if it can't see, if it relies on senses other than sight, such as blindsight, or if it can perceive illusions as false, as with truesight."

["Phantasmal Force"]
school = "Illusion"
level = 2
castingTime = "1 action"
range = 18
rangeLabel = "12"
damageTypes = [ "psychic" ]
duration = "Up to 1 min"
concentration = true
desc = "The target must make an Int/Cun saving throw. On a failed save, you create a phantasmal object, creature, or another visible phenomenon of your choice that is no larger than a 2 m cube and that is perceivable only to the target for the duration. This spell does not affect undead or constructs. The phantasm includes sound, temperature, and other stimuli, also evident only to the creature. The target can use its action to examine the phantasm with an Investigation (Cun) check against your spell save DC. If the check succeeds, the target realizes that the phantasm is an illusion, and the spell ends. While a target is affected by the spell, the target treats the phantasm as if it were real. The target rationalizes any illogical outcomes from interacting with the phantasm. For example, a target attempting to walk across a phantasmal bridge that spans a chasm falls once it steps onto the bridge. If the target survives the fall, it still believes that the bridge exists and comes up with some other explanation for its fall: it was pushed, it slipped, or a strong wind might have knocked it off. An affected target is so convinced of the phantasm’s reality that it can even take damage from the illusion. A phantasm created to appear as a creature can attack the target. Similarly, a phantasm created to appear as fire, a pool of acid, or lava can burn the target. Each round on your turn, the phantasm can deal 1d6 psychic damage to the target if it is in the phantasm’s area or within 1 m of the phantasm, provided that the illusion is of a creature or hazard that could logically deal damage, such as by attacking. The target perceives the damage as a type appropriate to the illusion."

["Shadow Blade"]
