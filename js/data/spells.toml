[Contagion]
school = "Vismancy"
level = 5
castingTime = "1 action"
range = 0
rangeLabel = "Touch"
damageTypes = []
duration = "7 days"
concentration = false
desc = "Make a melee spell attack against a creature within your reach. On a hit, the target is poisoned. At the end of each of the poisoned target's turns, the target must make a Vitality saving throw. If the target succeeds on three of these saves, it is no longer poisoned, and the spell ends. If the target fails three of these saves, the target is no longer poisoned, but choose one of the diseases below. The target is subjected to the chosen disease for the spell's duration. Since this spell induces a natural disease in its target, any effect that removes a disease or otherwise ameliorates a disease's effects apply to it. Blinding Sickness: Pain grips the creature's mind, and its eyes turn milky white. The creature has disadvantage on mental checks and Resolve saving throws and is blinded. Bloody Doom: The creature begins to bleed uncontrollably. The creature has disadvantage on Vitality checks and Vitality saving throws. In addition, whenever the creature takes damage, it is stunned until the end of its next turn. Fever: A raging fever sweeps through the creature's body. The creature has disadvantage on Brawn checks, Brawn saving throws, and attack rolls that use Brawn. Flesh Rot: The creature's flesh decays. The creature has disadvantage on social checks and vulnerability to all damage. Mindfire: The creature's mind becomes feverish. The creature has disadvantage on mental checks and Int/Cun saving throws, and the creature behaves as if under the effects of the Confusion spell during combat. Seizure: The creature is overcome with shaking. The creature has disadvantage on Dexterity checks, Dexterity saving throws, and attack rolls that use dexterity."

