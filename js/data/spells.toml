desc = "Choose a spell of level 5 or lower that you can cast, that has a casting time of an action, does not include Soul Consumption, and that can target you. You cast that spell—called the contingent spell—as part of casting Contingency, expending spell slots for both and rolling a Soul Check for the contingent spell, but the contingent spell doesn't come into effect immediately. Instead, it takes effect when a certain trigger occurs. You describe that trigger when you cast the two spells. For example, a Contingency cast with Water Breathing might stipulate that Water Breathing comes into effect when you are engulfed in water or a similar liquid.[] The contingent spell takes effect immediately after the trigger occurs for the first time, whether or not you want it to, and then the Contingency spell ends. You do not need to roll a Soul Check when the contingent spell triggers.[] The contingent spell takes effect only on you, even if it can normally target others. You can use only one Contingency spell at a time. If you cast this spell again, the effect of another Contingency spell on you ends.[]"

