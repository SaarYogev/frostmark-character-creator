[Imprisonment]
school = "Abjuration"
level = 9
castingTime = "1 Minute"
range = 6
rangeLabel = "6m"
damageTypes = []
duration = "Until Dispelled"
concentration = false
desc = "The target must succeed on a Resolve saving throw or be bound by the spell; if it succeeds, it is immune to this spell for 24 hours. On a failed save, the creature is imprisoned. While imprisoned it doesn't need to breathe, eat, or drink, and it doesn't age. Divination spells can't locate or perceive the target, and the target cannot teleport.[] When you cast the spell, you choose one of the following forms of imprisonment.[] ◘ Burial: The target is entombed far beneath the earth in a sphere of magical force that is just large enough to contain the target. Nothing can pass through the sphere, nor can any creature teleport or use Realm or dimension travel to get into or out of it.[] ◘ Chaining: Heavy chains, firmly rooted in the ground, hold the target in place. The target is restrained until the spell ends, and it can't move or be moved by any means until then.[] ◘ Minimus Containment: The target shrinks to a height of 2cm and is imprisoned inside a gemstone or similar object. Light can pass through the gemstone normally (allowing the target to see out and other creatures to see in), but nothing else can pass through, even utilizing teleportation or Realm or dimension travel. The gemstone can't be cut or broken while the spell remains in effect.[] ◘ Slumber: The target falls asleep and can't be awoken.[] Ending the Spell: When you cast the spell, specify a trigger that will end it. The trigger can be as simple or as elaborate as you choose, but the GM must agree that it has a high likelihood of happening within the next decade. The trigger must be an observable action, such as someone making a particular offering at the temple of your Enneade, saving a specific person, or defeating a specific monster.[] A Dispel Magic spell can end the spell only if it is cast with a level 9 spell slot and within range of the location of the Imprisonment spell.[]"

