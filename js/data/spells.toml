damageTypes = [ "poison", "psychic" ]
duration = "7 days"
concentration = false
desc = "A fortress of stone erupts from a square area of ground of your choice that you can see within range. The area is 40 m on each side, and it must not have any buildings or other structures on it. Any creatures in the area are harmlessly lifted up as the fortress rises. The fortress has four turrets with square bases, each one 6 m on a side and 9 m tall, with one turret on each corner. The turrets are connected to each other by stone walls that are each 25 m long, creating an enclosed area. Each wall is 0.25 m thick and is composed of panels that are 3 m wide and 6 m tall. Each panel is contiguous with two other panels or one other panel and a turret. You can place up to four stone doors in the fortress’s outer wall. A small keep stands inside the enclosed area. The keep has a square base that is 15 m on each side, and it has three floors with 3 m high ceilings. Each of the floors can be divided into as many rooms as you like, provided each room is at least 3 m on each side. The floors of the keep are connected by stone staircases, its walls are 20 cm thick, and interior rooms can have stone doors or open archways as you choose. The keep is furnished and decorated however you like, and it contains sufficient food to serve a nine-course banquet for up to 100 people each day. Furnishings, food, and other objects created by this spell crumble to dust if removed from the fortress. A staff of one hundred invisible servants obeys any command given to them by creatures you designate when you cast the spell. Each servant functions as if created by the unseen servant spell. The walls, turrets, and keep are all made of stone that can be damaged. Every 3 m by a 3 m section of stone has AC 15 and 175 hp for the outer walls and 150 hp for the inner walls. It is immune to poison and psychic damage. Reducing a section of stone to 0 hit points destroys it and might cause connected sections to buckle and collapse at the GM’s discretion. After 7 days or when you cast this spell somewhere else, the fortress harmlessly crumbles and sinks back into the ground, leaving any creatures that were inside it safely on the ground. Casting this spell on the same spot once every 7 days for 7 days makes the fortress permanent."

[Tsunami]
school = "Conjuration"
level = 8
castingTime = "1 minute"
range = 18
rangeLabel = "Sight"
damageTypes = [ "force" ]
duration = "Up to 6 rounds"
concentration = true
desc = "A wall of water springs into existence at a point you choose within range. You can make the wall up to 100 m long, 100 m high, and 15 m thick. The wall lasts for the duration. When the wall appears, each creature within its area must make a Brawn saving throw. On a failed save, a creature takes 6d10 force damage, or half as much damage on a successful save. At the start of each of your turns after the wall appears, the wall, along with any creatures in it, moves 10 m away from you. Any Huge or smaller creature inside the wall or whose space the wall enters when it moves must succeed on a Brawn saving throw or take 5d10 force damage. A creature can take this damage only once per round. At the end of the turn, the wall’s height is reduced by 15, and the damage creatures take from the spell on subsequent rounds is reduced by 1d10. When the wall reaches 0 m in height, the spell ends. A creature caught in the wall can move by swimming. Because of the force of the wave, though, the creature must make a successful Athletics (Br) check against your spell save DC to move at all. If it fails the check, it can’t move. A creature that moves out of the area falls to the ground."

