["Stone Shape"]
school = "Transmutation"
level = 4
castingTime = "1 action"
range = 0
rangeLabel = "Touch"
damageTypes = []
duration = "Instant"
concentration = false
desc = "You touch a stone object of Medium size or smaller or a section of stone no more than 1 meter in any dimension and form it into any shape that suits your purpose. So, for example, you could shape a large rock into a weapon, idol, or coffer, or make a small passage through a wall, as long as the wall is less than 1 meter thick. You could also shape a stone door or its frame to seal the door shut. The object you create can have up to two hinges and a latch, but finer mechanical detail isn't possible."

["Animate Object"]
school = "Transmutation"
level = 5
castingTime = "1 action"
range = 0
rangeLabel = "Self"
damageTypes = []
duration = "1 minute"
concentration = true
desc = "Choose up to ten nonmagical objects within range that are not being worn or carried. Medium targets count as two objects, Large targets count as four objects, Huge targets count as eight objects. You can't animate any object larger than Huge. Each target animates and becomes a creature under your control until the spell ends or until reduced to 0 hit points. As a bonus action, you can mentally command any creature you made with this spell if the creature is within 150 meters of you (if you control multiple creatures, you can command any or all of them at the same time, issuing the same command to each one). You decide what action the creature will take and where it will move during its next turn, or you can issue a general command, such as to guard a particular chamber or corridor. If you issue no commands, the creature only defends itself against hostile creatures. Once given an order, the creature continues to follow it until its task is complete. An animated object is a construct with AC, hit points, attacks, Brawn, and Dexterity determined by its size. Its Vitality is 10 and its mental and social scores are 3. Its speed is 6 meters; if the object lacks legs or other appendages it can use for locomotion, it instead has a flying speed of 6 meters and can hover. If the object is securely attached to a surface or a larger object, such as a chain bolted to a wall, its speed is 0. It has blindsight with a radius of 6 m and is blind beyond that distance. When the animated object drops to 0 hit points, it reverts to its original object form, and any remaining damage carries over to its original object form. At higher levels; If you cast the spell using a spell slot of 6th level or higher, you can animate two additional objects for each slot level above 5th."

[Awaken]
school = "Transmutation"
level = 5
castingTime = "8 hours"
range = 0
rangeLabel = "Touch"
damageTypes = []
duration = "Instant"
concentration = false
desc = "You touch a Huge or smaller beast, animal or plant. The target must have either no Intelligence score or an Intelligence of 3 or less. The target gains an Intelligence of 10. The target also gains the ability to speak one language you know. If the target is a plant, it gains the ability to move its limbs, roots, vines, creepers, and so forth, and it gains senses similar to a human's. Your GM chooses statistics appropriate for the awakened plant, such as the statistics for the Awakened Shrub or the Awakened Tree. The Awakened Beast, Animal or Plant is charmed by you for 30 days or until you or your companions do anything harmful to it. When the charmed condition ends, the awakened creature chooses whether to remain friendly to you, based on how you treated it while it was charmed."

["Control Winds"]
school = "Transmutation"
level = 5
castingTime = "1 action"
range = 18
rangeLabel = "60"
damageTypes = []
duration = "Up to 1-hour"
concentration = true
desc = "Choose one of the following effects when you cast the spell. The effect lasts for the spell’s duration unless you use your action on a later turn to switch to a different effect. You can also use your action to temporarily halt the effect or to restart one you’ve halted. Gusts: A wind picks up within the cube, continually blowing in a horizontal direction you designate. You choose the intensity of the wind: calm, moderate, or strong. If the wind is moderate or strong, ranged weapon attacks that enter or leave the cube or pass through it have disadvantage on their attack rolls. If the wind is strong, any creature moving against the wind must spend 1 m of movement for each m moved. Downdraft: You cause a sustained blast of strong wind to blow downward from the top of the cube. Ranged weapon attacks that pass through the cube or that are made against targets within it have disadvantage on their attack rolls. A creature must make a Brawn saving throw if it flies into the cube for the first time on a turn or starts its turn there flying. On a failed save, the creature is knocked prone. Updraft: You cause a sustained updraft within the cube, rising upward from the cube’s bottom side. Creatures that end a fall within the cube take only half damage from the fall. When a creature in the cube makes a vertical jump, the creature can jump up to 2 m higher than normal."

[Passwall]
school = "Transmutation"
level = 5
castingTime = "1 action"
range = 18
rangeLabel = "6"
damageTypes = []
duration = "1 hour"
concentration = false
desc = "A passage appears at a point of your choice that you can see on a wooden, plaster, or stone surface (such as a wall, a ceiling, or a floor) within range, and lasts for the duration. You choose the opening's dimensions: up to 1.5 meters wide, 2.5 meters tall, and 4 meters deep. The passage creates no instability in a structure surrounding it. When the opening disappears, any creatures or objects still in the passage created by the spell are safely ejected to an unoccupied space nearest to the surface on which you cast the spell."

[Telekinesis]
school = "Transmutation"
level = 5
castingTime = "1 action"
range = 18
rangeLabel = "12"
damageTypes = []
duration = "10 minutes"
concentration = true
desc = "You gain the ability to move or manipulate creatures or objects by thought. When you cast the spell, and as your action each round for the duration, you can exert your will on one creature or object that you can see within range, causing the appropriate effect below. You can affect the same target round after round, or choose a new one at any time. If you switch targets, the prior target is no longer affected by the spell. Creature: You can try to move a Huge or smaller Creature. Make an ability check with your spellcasting ability contested by the creature's Brawn check. If you win the contest, you move the creature up to 6 meters in any direction, including upward but not beyond the range of this spell. Until the end of your next turn, the creature is restrained in your telekinetic grip. A creature lifted upward is suspended in mid-air. On subsequent rounds, you can use your action to attempt to maintain your telekinetic grip on the creature by repeating the contest. Object: You can try to move an object that weighs up to 450 kg. If the object isn't being worn or carried, you automatically move it up to 6 meters in any direction, but not beyond the range of this spell. If the object is worn or carried by a creature, you must make an ability check with your spellcasting ability contested by that creature's Brawn check. If you succeed, you pull the object away from that creature and can move it up to 6 meters in any direction but not beyond the range of this spell. You can exert fine control on objects with your telekinetic grip, such as manipulating a simple tool, opening a door or a container, stowing or retrieving an item from an open container, or pouring the contents from a vial."

["Transmute Rock"]
school = "Transmutation"
level = 5
castingTime = "1 action"
range = 18
rangeLabel = "24"
damageTypes = [ "force", "poison", "psychic" ]
duration = "Until dispelled"
concentration = false
desc = "You choose an area of stone or mud that you can see that fits within an 8 m cube and is within range, and choose one of the following effects. Transmute Rock to Mud: Nonmagical rock of any sort in the area becomes an equal volume of thick, flowing mud that remains for the spell’s duration. The ground in the spell’s area becomes muddy enough that creatures can sink into it. Every 1 m that a creature moves through the mud costs 2 m of movement, and any creature on the ground when you cast the spell must make a Brawn saving throw. A creature must also make the saving throw when it moves into the area for the first time on a turn or ends its turn there. On a failed save, a creature sinks into the mud and is restrained, though it can use an action to end the restrained condition on itself by pulling itself free of the mud. If you cast the spell on a ceiling, the mud falls. Any creature under the mud when it falls must make a Dexterity saving throw. A creature takes 4d8 force damage on a failed save, or half as much damage on a successful one. Transmute Mud to Rock: Nonmagical mud or quicksand in the area no more than 2 m deep transforms into soft stone for the spell’s duration. Any creature in the mud when it transforms must make a Dexterity saving throw. On a successful save, a creature is shunted safely to the surface in an unoccupied space. On a failed save, a creature becomes restrained by the rock. A restrained creature, or another creature within reach, can use an action to try to break the rock by succeeding on a DC 20 Brawn check or by dealing damage to it. The rock has AC 15 and 25 hit points, and it is immune to poison and psychic damage."

["Bones of the Earth"]
