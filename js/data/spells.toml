rangeLabel = "12"
damageTypes = [ "force" ]
duration = "Instant"
concentration = false
desc = "The target can be a creature, an object, or a creation of magical force, such as the wall created by a Wall Of Force. A creature targeted by this spell must make a Dexterity saving throw. On a failed save, the target takes 15d6+20 force damage. The target is disintegrated if this damage leaves it with 0 hit points. A disintegrated creature and everything it is wearing and carrying, except magic items, are reduced to a pile of fine gray dust. The creature can be restored to life only using a True Resurrection or a Wish spell. This spell automatically disintegrates a Large or smaller nonmagical object or a creation of magical force. If the target is a Huge or larger object or creation of force, this spell disintegrates a 2 m cube portion of it. A magic item is unaffected by this spell. At higher levels: When you cast this spell using a spell slot of 7th level or higher, the damage increases by 3d6 for each slot level above 6th."

["Flesh to Stone"]
school = "Transmutation"
level = 6
castingTime = "1 action"
range = 18
rangeLabel = "12"
damageTypes = []
duration = "1 minute"
concentration = true
desc = "You attempt to petrify one creature that you can see within range. If the target's body is made of flesh, the creature must make a Vitality saving throw. On a failed save, it is restrained as its flesh begins to harden. On a successful save, the creature isn't affected. A creature restrained by this spell must make another Vitality saving throw at the end of each of its turns. If it successfully saves against this spell three times, the spell ends. If it fails its saves three times, it is turned to stone and subjected to the petrified condition for the duration. The successes and failures don't need to be consecutive; keep track of both until the target collects three of a kind. If the creature is physically broken while petrified, it suffers from similar deformities if it reverts to its original state. If you maintain your concentration on this spell for the entire possible duration, the creature is turned to stone until the effect is removed."

["Move Earth"]
school = "Transmutation"
level = 6
castingTime = "1 action"
range = 18
rangeLabel = "24"
damageTypes = []
duration = "2 hours"
concentration = true
desc = "Choose an area of terrain no larger than 8 meters on a side within range. You can reshape dirt, sand, or clay in the area in any manner you choose for the duration. You can raise or lower the area's elevation, create or fill in a trench, erect or flatten a wall, or form a pillar. The extent of any such changes can't exceed half the area's largest dimension. So, if you affect an 8-meter square, you can create a pillar up to 4 meters high, raise or lower the square's elevation by up to 4 meters, dig a trench up to 4 meters deep, and so on. It takes 10 minutes for these changes to complete. At the end of every 10 minutes you spend concentrating on the spell, you can choose a new area of terrain to affect. Because the terrain's transformation occurs slowly, creatures in the area can't usually be trapped or injured by the ground's movement. This spell can't manipulate natural stone or stone construction. Rocks and structures shift to accommodate the new terrain. If the way you shape the terrain would make a structure unstable, it might collapse. Similarly, this spell doesn't directly affect plant growth. The moved earth carries any plants along with it."

["Wind Walk"]
school = "Transmutation"
level = 6
castingTime = "1 minute"
range = 18
rangeLabel = "6"
damageTypes = []
duration = "8 hours"
concentration = false
desc = "You and up to ten willing creatures you can see within range assume a gaseous form for the duration. While in this cloud form, a creature has a flying speed of 18 meters and has resistance to damage from nonmagical weapons. The only actions a creature can take in this form are the dash action or to revert to its normal form. Reverting takes 1 minute, during which time a creature is incapacitated and can't move. Until the spell ends, a creature can revert to cloud form, which also requires the 1-minute transformation. If a creature is in cloud form and flying when the effect ends, the creature descends 12 meters per round for 1 minute until it lands, which it does safely. If it can't land after 1 minute, the creature falls the remaining distance."

[Etherealness]
school = "Transmutation"
level = 7
castingTime = "1 action"
range = 0
rangeLabel = "Self"
damageTypes = [ "force" ]
duration = "8 hours"
concentration = false
desc = "You step into the Ethereal Plane, the invisible plane that overlaps with all Realms. You remain in the Ethereal Plane for the duration or until you use your action to dismiss the spell. During this time, you can Move in any direction. If you move up or down, every m of movement costs an extra meter. You can see and hear the Realm you originated from, but everything there looks gray, and you can't see anything more than 12 m away. While on the Ethereal Plane, you can only affect and be affected by other creatures on that plane. Creatures that aren't on the Ethereal Plane can't perceive you and can't interact with you unless a special ability or magic has given them the ability to do so. You ignore all objects and effects that aren't on the Ethereal Plane, allowing you to move through objects you perceive on the Realm you originated from. When the spell ends, you immediately return to the Realm you originated from in the spot you currently occupy. If you occupy the same spot as a solid object or creature when this happens, you are immediately shunted to the nearest unoccupied space that you can occupy and take force damage equal to twice the number of m you are moved. This spell does not affect if you cast it while you are on the Ethereal Plane. At higher levels: When you cast this spell using a spell slot of 8th level or higher, you can target up to three willing creatures (including you) for each slot level above 7th. The creatures must be within 2 m of you when you cast the spell."

[Regenerate]
school = "Transmutation"
level = 7
castingTime = "1 minute"
range = 0
rangeLabel = "Touch"
damageTypes = []
duration = "1 hour"
concentration = false
desc = "The target regains 4d8+15 hit points. For the duration of the spell, the target regains 1 hit point at the start of each of its turns (10 hit points each minute). The target's severed body members (fingers, legs, tails, and so on), if any, are restored after 2 minutes. If you have the severed part and hold it to the stump, the spell instantaneously causes the limb to knit to the stump."

["Reverse Gravity"]
school = "Transmutation"
level = 7
castingTime = "1 action"
range = 18
rangeLabel = "30"
damageTypes = []
duration = "1 minute"
concentration = true
desc = "This spell reverses gravity in a 15-meter radius, 30 meters high cylinder centered on a point within range. All creatures and objects that aren't somehow anchored to the ground in the area fall upward and reach the top of the area when you cast this spell. A creature can make a Dexterity saving throw to grab onto a fixed object it can reach, thus avoiding the fall. If some solid object (such as a ceiling) is encountered in this fall, falling objects and creatures strike it just as they would during a normal downward fall. If an object or creature reaches the top of the area without striking anything, it remains there, oscillating slightly, for the duration. At the end of the duration, affected objects and creatures fall back down."

[Sequester]
school = "Transmutation"
level = 7
castingTime = "1 action"
range = 0
rangeLabel = "Touch"
damageTypes = []
duration = "Until dispelled"
concentration = false
desc = "Using this spell, a willing creature or an object can be hidden away, safe from detection for the duration. When you cast the spell and touch the target, it becomes invisible and can't be targeted by divination spells or perceived through scrying sensors created by divination spells. If the target is a creature, it falls into a state of suspended animation. Time ceases to flow for it, and it doesn't grow older. You can set a condition for the spell to end early. The condition can be anything you choose, but it must occur or be visible within 1500 meters of the target. This spell also ends if the target takes any damage."

["Animal Shapes"]
school = "Transmutation"
level = 8
castingTime = "1 action"
range = 18
rangeLabel = "6"
damageTypes = []
duration = "24 hours"
concentration = true
desc = "Choose any number of willing creatures that you can see within range. You transform each target into the form of a Large or smaller beast or animal with a challenge rating of 4 or lower. On subsequent turns, you can use your action to transform affected creatures into new forms. The transformation lasts for the duration for each target, or until the target drops to 0 hit points or dies. You can choose a different form for each target. A target's game statistics are replaced by the statistics of the chosen beast or animal, though the target retains its alignment and mental and social ability scores. The target assumes the hit points of its new form, and when it reverts to its normal form, it returns to the number of hit points it had before it transformed. If it reverts as a result of dropping to 0 hit points, any excess damage carries over to its normal form. As long as the excess damage doesn't reduce the creature's normal form to 0 hit points, it isn't knocked unconscious. The creature is limited in the actions it can perform by the nature of its new form, and it can't speak or cast spells. The target's gear melds into the new form. The target can't activate, wield, or otherwise benefit from any of its equipment."

["Control Weather"]
school = "Transmutation"
level = 8
castingTime = "10 minutes"
range = 0
rangeLabel = "Self"
damageTypes = []
duration = "8 hours"
concentration = true
desc = "You must be outdoors to cast this spell. Moving to a place where you don’t have a clear path to the sky ends the spell early. When you cast the spell, you change the current weather conditions, which are determined by the GM based on the climate and season. You can change precipitation, temperature, and wind. It takes 1d4×10 minutes for the new conditions to take effect. Once they do so, you can change the conditions again. When the spell ends, the weather gradually returns to normal. When you change the weather conditions, find a current condition on the following tables, and change its stage by one, up or down. When changing the wind, you can change its direction. Temperature Wind Precipitation"

[Shapechange]
school = "Transmutation"
level = 9
castingTime = "1 action"
range = 0
rangeLabel = "Self"
damageTypes = []
duration = "1 hour"
concentration = true
desc = "You assume the form of a different creature for the duration. The new form can be of any creature with a challenge rating equal to your level or lower. The creature can't be a construct or an undead, and you must have seen the sort of creature at least once. You transform into an average example of that creature, one without any AO levels or the spellcasting trait. Your game statistics are replaced by the statistics of the chosen creature, though you retain your personality and social and mental ability scores. You also retain all of your skill ranks and saving throw proficiencies, in addition to gaining those of the creature. If the creature has the same proficiency as you and the bonus listed in its statistics is higher than yours, use the creature's bonus in place of yours. You can't use any legendary actions or lair actions of the new form. You assume the hit points and hit dice of the new form. When you revert to your normal form, you return to the number of hit points you had before you transformed. If you revert as a result of dropping to 0 hit points, any excess damage carries over to your normal form. As long as the excess damage doesn't reduce your normal form to 0 hit points, you aren't knocked unconscious. You retain the benefit of any features from your AO abilities, race, or other source and can use them, provided that your new form is physically capable of doing so. You can't use any special senses you have (for example, darkvision) unless your new form also has that sense. You can only speak if the creature can normally speak. When you transform, you choose whether your equipment falls to the ground, merges into the new form, or is worn by it. Worn equipment functions as normal. The GM determines whether it is practical for the new form to wear a piece of equipment, based on the creature's shape and size. Your equipment doesn't change shape or size to match the new form, and any equipment that the new form can't wear must either fall to the ground or merge into your new form. Equipment that merges does not affect that state. During this spell's duration, you can use your action to assume a different form following the same restrictions and rules for the original form, with one exception: if your new form has more hit points than your current one, your hit points remain at their current value."

["True Polymorph"]
school = "Transmutation"
level = 9
castingTime = "1 action"
range = 18
rangeLabel = "6"
damageTypes = []
duration = "1 hour"
concentration = true
desc = "Choose one creature or a nonmagical object that you can see within range. You transform the creature into a different creature, the creature into a nonmagical object, or the object into a creature (the object must be neither worn nor carried by another creature). The transformation lasts for the duration, or until the target drops to 0 hit points or dies. If you concentrate on this spell for the full duration, the spell lasts until it is dispelled. This spell does not affect a shapechanger or a creature with 0 hit points. An unwilling creature can make a Composure saving throw, and if it succeeds, it isn't affected by this spell. Creature into Creature: If you turn a creature into another kind of creature, the new form can be any kind you choose whose challenge rating is equal to or less than the target's (or its level, if the target doesn't have a challenge rating). The target's game statistics, including mental and social ability scores, are replaced by the statistics of the new form. It retains its personality. The target assumes the hit points of its new form, and when it reverts to its normal form, the creature returns to the number of hit points it had before it transformed. If it reverts as a result of dropping to 0 hit points, any excess damage carries over to its normal form. As long as the excess damage doesn't reduce the creature's normal form to 0 hit points, it isn't knocked unconscious. The creature is limited in the actions it can perform by the nature of its new form, and it can't speak, cast spells, or take any other action that requires hands or speech unless its new form is capable of such actions. The target's gear melds into the new form. The creature can't activate, use, wield, or otherwise benefit from any of its equipment. Object into Creature: You can turn any object into any kind of creature, as long as the creature's size is no larger than the object's size and the creature's challenge rating is 9 or lower. The creature is friendly to you and your companions. It acts on each of your turns. You decide what action it takes and how it moves. The GM has the creature's statistics and resolves all of its actions and movement. If the spell becomes permanent, you no longer control the creature. It might remain friendly to you, depending on how you have treated it. Creature into Object: If you turn a creature into an object, it transforms along with whatever it is wearing and carrying into that form, as long as the object's size is no larger than the creature's size. The creature's statistics become those of the object, and the creature has no memory of time spent in this form after the spell ends and it returns to its normal form."

