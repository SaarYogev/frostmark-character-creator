concentration = false
desc = "As you cast the spell, you draw a 2 m diameter circle on the ground inscribed with sigils that link your location to a permanent Teleportation Circle of your choice whose sigil sequence you know and that is on the same Realm as you. A shimmering portal opens within the circle you drew and remains open until the end of your next turn. Any creature that enters the portal instantly appears within 1 m of the destination circle or in the nearest unoccupied space if that space is occupied. Each such circle includes a unique sigil sequence, a string of Copta runes arranged in a particular pattern. When you first gain the ability to cast this spell, you may learn up to two sigil sequences for two destinations, if the GM allows it. You can learn additional sigil sequences during your adventures. You can commit a new sigil sequence to memory after studying it for 1 minute. You can create a permanent Teleportation Circle by casting this spell in the same location for seven days. If you do, you have created another fixed Teleportation Circle destination. When casting Teleportation Circle with a permanent Teleportation Circle you cast without paying Soul Consumption."

