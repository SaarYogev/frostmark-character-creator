["Prismatic Wall"]
school = "Abjuration"
level = 9
castingTime = "Action"
range = 12
rangeLabel = "12m"
damageTypes = [ "fire", "cold", "lightning", "force", "poison" ]
duration = "1 Minute"
concentration = false
desc = "You create a wall up to 18m long, 6m high, and 2cm thick, centered on a point you can see within range. Alternatively, you can shape the wall into a sphere up to 6m in diameter centered on a point you choose within range. The wall remains in place for the duration. If you position the wall so that it passes through a space occupied by a creature, the spell fails, and your action and the spell slot are wasted.[] The wall sheds bright light out to a range of 20m and dim light for an additional 20m. You and creatures you designate at the time you cast the spell can pass through and remain near the wall without harm. If another creature that can see the wall moves to within 4m of it or starts its turn there, the creature must succeed on a Vitality saving throw or become blinded for 1 minute.[] Layers: The wall consists of seven layers, each with a different color. When a creature attempts to reach into or pass through the wall, it does so one layer at a time through all the wall's layers. As it passes or reaches through each layer, the creature must make a Dexterity saving throw or be affected by that layer's properties as described below.[] The wall, which has AV 10, can be destroyed one layer at a time by means specific to each layer. If a layer is destroyed, it is gone for the duration. Antimagic Field has no effect on the wall, and Dispel Magic can affect only the violet layer.[] 1. Red: The creature takes 10d6 fire damage on a failed save, or half as much damage on a successful one. While this layer is in place, nonmagical ranged attacks can't pass through the wall. The layer can be destroyed by dealing at least 25 cold damage to it.[] 3. Yellow: The creature takes 10d6 lightning damage on a failed save, or half as much damage on a successful one. This layer can be destroyed by dealing at least 25 force damage to it.[] 4. Green: The creature takes 10d6 poison damage on a failed save, or half as much damage on a successful one. A Passwall spell, or another spell of equal or greater level that can open a portal on a solid surface, destroys this layer.[] 5. Blue: The creature takes 10d6 cold damage on a failed save, or half as much damage on a successful one. This layer can be destroyed by dealing at least 25 fire damage to it.[] 6. Indigo: On a failed save, the creature is restrained. It must then make a Vitality saving throw at the end of each of its turns. If it successfully saves three times, the spell ends. If it fails its save three times, it permanently turns to stone and is subjected to the petrified condition. The successes and failures don't need to be consecutive; keep track of both until the creature collects three of a kind. While this layer is in place, spells can't be cast through the wall. The layer is destroyed by bright light shed by a Daylight spell or a similar spell of equal or higher level.[] 7. Violet: On a failed save, the creature is blinded. It must then make a Resolve saving throw at the start of your next turn. A successful save ends the blindness. If it fails that save, the creature is transported to another Realm of the GM's choosing and is no longer blinded. (Typically, a creature that is in a Realm that isn't its home Realm is banished home, while other creatures are usually cast into the Stellar Expanse or Ethereal dimension.) This layer is destroyed by a Dispel Magic spell or a similar spell of equal or higher level that can end spells and magical effects.[]"

