desc = "You create an immobile, invisible, cube-shaped, magical force prison composed in an area you choose within range. You can choose if the prison is a cage or a solid box.[] A prison in the shape of a cage can be up to 4m on a side and is made from 0.1m diameter bars spaced 0.1m apart. A prison in the shape of a box can be up to 2m on a side, creating a solid barrier that prevents any matter from passing through it and blocking any spells cast into or out from the area.[] When you cast the spell, any creature that is completely inside the cage's area is trapped. Creatures only partially within the area, or those too large to fit inside the area, are pushed away from the center of the area until they are completely outside the area.[] A creature inside the cage can't leave it by nonmagical means. If the creature tries to use Teleportation or inter-realm travel to leave the cage, it must first make a Pre/Man saving throw. On a success, the creature can use that magic to exit the cage. On a failure, the creature can't exit the cage and wastes the use of the spell or effect. The cage also extends into the Ethereal Dimension, blocking ethereal travel. This spell can't be dispelled by Dispel Magic.[]"

[Symbol]
school = "Abjuration"
level = 7
castingTime = "1 Minute"
range = 12
rangeLabel = "12m"
damageTypes = [ "necrotic" ]
duration = "Dispelled/Triggered"
concentration = false
desc = "When you cast this spell, you inscribe a glyph either on a surface (such as a section of floor, a wall, or a table) or within an object that can be closed to conceal the glyph (such as a book, a scroll, or a treasure chest). If you choose a surface, the glyph can cover an area of the surface no larger than 2m in diameter. If you choose an object, that object must remain in its place; if the object is moved more than 2m from where you cast this spell, the glyph is broken, and the spell ends without being triggered.[] A creature who has cast a Symbol spell may expend a level 7 spell slot to retrieve the Soul Potency spent and dispel the Symbol if they are within 1m of the Symbol and spend one uninterrupted minute in a ritual.[] The glyph is nearly invisible, requiring an Investigation (Cun) check against your spell save DV to find it.[] Set the Trigger: You decide what triggers the glyph when you cast the spell. For glyphs inscribed on a surface, the most typical triggers include touching or stepping on the glyph, removing another object covering it, approaching within a certain distance of it, or manipulating the object that holds it. For glyphs inscribed within an object, the most common triggers are opening the object, approaching within a certain distance of it, or seeing or reading the glyph.[] You can further refine the trigger so the spell is activated only under certain circumstances or according to a creature's physical characteristics (such as height or weight), or physical kind (for example, the ward could be set to affect Hags or Shapechangers). You can also specify creatures that don't trigger the glyph, such as those who say a certain password.[] Triggered: When you inscribe the glyph, choose one of the options below for its effect. Once triggered, the glyph glows, filling a 12m radius sphere with dim light for 10 minutes, after which time the spell ends. Each creature in the sphere when the glyph activates is targeted by its effect, as is a creature that enters the sphere for the first time on a turn or ends its turn there.[] ◘ Death: Each target must make a Vitality saving throw, taking 10d10 necrotic damage on a failed save, or half as much damage on a successful save.[] ◘ Discord: Each target must make a Vitality saving throw. On a failed save, a target bickers and argues with other creatures for 1 minute. During this time, it is incapable of meaningful communication and has disadvantage on attack rolls and ability checks.[] ◘ Fear: Each target must make a Resolve saving throw and becomes frightened for 1 minute on a failed save. While frightened, the target drops whatever it is holding and must move at least 6m away from the glyph on each of its turns, if able.[] ◘ Hopelessness: Each target must make a Composure saving throw. On a failed save, the target is overwhelmed with despair for 1 minute. During this time, it can't attack or target any creature with harmful abilities, spells, or other magical effects.[] ◘ Insanity: Each target must make an Int/Cun saving throw. On a failed save, the target is driven insane for 1 minute. An insane creature can't take actions, can't understand what other creatures say, can't read, and speaks only in gibberish. The GM controls its movement, which is erratic.[] ◘ Pain: Each target must make a Vitality saving throw and becomes incapacitated with excruciating pain for 1 minute on a failed save.[] ◘ Sleep: Each target must make a Resolve saving throw and falls unconscious for 10 minutes on a failed Save. A creature awakens if it takes damage or if someone uses an action to shake or slap it awake.[] ◘ Stunning: Each target must make a Composure saving throw and becomes stunned for 1 minute on a failed save.[]"

