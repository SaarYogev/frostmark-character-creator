concentration = true
desc = "Up to five Small or Medium corpses you can see within range immediately stands up and becomes undead. You decide whether it is a zombie or a skeleton (the statistics for zombies and skeletons are in the Bestiary), and it gains a bonus to its attack and damage rolls equal to your spellcasting ability modifier. You can use a bonus action to mentally command the creatures you make with this spell, issuing the same command to all of them. To receive the command, a creature must be within 12 m of you. You decide what action the creatures will take and where they will move during their next turn, or you can issue a general command, such as to guard a chamber or passageway against your foes. If you issue no commands, the creatures do nothing except defend themselves against hostile creatures. Once given an order, the creatures continue to follow it until their task is complete. The creatures are under your control until the spell ends, after which they become inanimate once more. At higher level: When you cast this spell using a spell slot of 6th level or higher, you animate up to two additional corpses for each slot level above 5th."

[Hallow]
school = "Vismancy"
level = 5
castingTime = "24 hours"
range = 0
rangeLabel = "Touch"
damageTypes = [ "bludgeoning", "piercing", "slashing" ]
duration = "Until dispelled"
concentration = false
desc = "You touch a point and infuse an area around it with divine power. The area can have a radius up to 12 m, and the spell fails if the radius includes an area already under the effect of a Hallow spell. The affected area is subject to the following effects. First, celestials, elementals, fey, fiends, and undead can't enter the area, nor can such creatures charm, frighten, or possess creatures within it. Any creature charmed, frightened, or possessed by such a creature is no longer charmed, frightened, or possessed upon entering the area. You can exclude one or more of those types of creatures from this effect. Second, you can bind an extra effect to the area. Choose the effect from the following list, or choose an effect offered by the GM. Some of these effects apply to creatures in the area; you can designate whether the effect applies to all creatures, creatures that follow a specific deity or leader, or creatures of a specific sort, such as orcs or trolls. When a creature that would be affected enters the spell's area for the first time on a turn or starts its turn there, it can make a Pre/Man saving throw. On a success, the creature ignores the extra effect until it leaves the area.\nCourage: Affected creatures can't be frightened while in the area. Darkness: Magical darkness fills the area. Daylight: Magical bright light fills the area. Energy Protection: Affected creatures in the area have resistance to one damage type of your choice, except for bludgeoning, piercing, or slashing. Energy Vulnerability: Affected creatures in the area have vulnerability to one damage type of your choice, except for bludgeoning, piercing, or slashing. Everlasting Rest: Dead bodies interred in the area can't be turned into undead. Extradimensional Interference: Affected creatures can't move or travel using teleportation or by extradimensional or interplanar means. Fear: Affected creatures are frightened while in the area. Silence: No sound can emanate from within the area, and no sound can reach into it. Tongues: Affected creatures can communicate with any other creature in the area, even if they don't share a common language."

